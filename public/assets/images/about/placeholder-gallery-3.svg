<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2A1D"/><stop offset="100%" stop-color="#121A16"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6C78B"/><stop offset="50%" stop-color="#C8A96A"/><stop offset="100%" stop-color="#8B6A3E"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Step 1: Cortar -->
  <g transform="translate(70, 100)" opacity="0.3">
    <circle cx="30" cy="30" r="28" fill="none" stroke="url(#gold)" stroke-width="1.2"/>
    <path d="M15 20 L45 20 M15 30 L40 30 M15 40 L35 40" stroke="#C8A96A" stroke-width="0.8" stroke-linecap="round"/>
    <text x="30" y="75" font-family="system-ui,sans-serif" font-size="10" fill="#7A8C85" text-anchor="middle">Cortar</text>
  </g>
  <!-- Arrow 1 -->
  <g transform="translate(135, 125)" opacity="0.2">
    <path d="M0 5 Q30 -5, 55 5" fill="none" stroke="#C8A96A" stroke-width="1"/>
    <polygon points="55,5 48,0 50,8" fill="#C8A96A"/>
  </g>
  <!-- Step 2: Tapizar -->
  <g transform="translate(200, 100)" opacity="0.3">
    <circle cx="30" cy="30" r="28" fill="none" stroke="url(#gold)" stroke-width="1.2"/>
    <rect x="14" y="18" width="32" height="24" rx="3" fill="#1a5c3a" opacity="0.3"/>
    <path d="M14 26 Q30 22, 46 26" fill="none" stroke="#C8A96A" stroke-width="0.6"/>
    <path d="M14 34 Q30 30, 46 34" fill="none" stroke="#C8A96A" stroke-width="0.6"/>
    <text x="30" y="75" font-family="system-ui,sans-serif" font-size="10" fill="#7A8C85" text-anchor="middle">Tapizar</text>
  </g>
  <!-- Arrow 2 -->
  <g transform="translate(265, 125)" opacity="0.2">
    <path d="M0 5 Q30 -5, 55 5" fill="none" stroke="#C8A96A" stroke-width="1"/>
    <polygon points="55,5 48,0 50,8" fill="#C8A96A"/>
  </g>
  <!-- Step 3: Ensamblar -->
  <g transform="translate(330, 100)" opacity="0.3">
    <circle cx="30" cy="30" r="28" fill="none" stroke="url(#gold)" stroke-width="1.2"/>
    <rect x="16" y="16" width="28" height="18" rx="2" fill="none" stroke="#C8A96A" stroke-width="0.8"/>
    <line x1="22" y1="34" x2="22" y2="44" stroke="#C8A96A" stroke-width="0.8"/>
    <line x1="38" y1="34" x2="38" y2="44" stroke="#C8A96A" stroke-width="0.8"/>
    <text x="30" y="75" font-family="system-ui,sans-serif" font-size="10" fill="#7A8C85" text-anchor="middle">Ensamblar</text>
  </g>
  <!-- Arrow 3 -->
  <g transform="translate(395, 125)" opacity="0.2">
    <path d="M0 5 Q30 -5, 55 5" fill="none" stroke="#C8A96A" stroke-width="1"/>
    <polygon points="55,5 48,0 50,8" fill="#C8A96A"/>
  </g>
  <!-- Step 4: Verificar -->
  <g transform="translate(460, 100)" opacity="0.3">
    <circle cx="30" cy="30" r="28" fill="none" stroke="url(#gold)" stroke-width="1.2"/>
    <path d="M18 30 L26 38 L42 22" fill="none" stroke="#C8A96A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="30" y="75" font-family="system-ui,sans-serif" font-size="10" fill="#7A8C85" text-anchor="middle">Verificar</text>
  </g>
  <text x="300" y="260" font-family="Georgia,serif" font-size="18" fill="#C8A96A" text-anchor="middle" letter-spacing="3" opacity="0.7">PROCESO</text>
  <text x="300" y="285" font-family="system-ui,sans-serif" font-size="11" fill="#7A8C85" text-anchor="middle" letter-spacing="1">Cada paso cuenta en la excelencia</text>
  <path d="M15 15 L45 15 M15 15 L15 45" stroke="#C8A96A" stroke-width="0.8" fill="none" opacity="0.12"/>
  <path d="M585 15 L555 15 M585 15 L585 45" stroke="#C8A96A" stroke-width="0.8" fill="none" opacity="0.12"/>
  <path d="M15 385 L45 385 M15 385 L15 355" stroke="#C8A96A" stroke-width="0.8" fill="none" opacity="0.12"/>
  <path d="M585 385 L555 385 M585 385 L585 355" stroke="#C8A96A" stroke-width="0.8" fill="none" opacity="0.12"/>
</svg>
