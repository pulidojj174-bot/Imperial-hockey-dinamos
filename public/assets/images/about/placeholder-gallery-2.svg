<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2A1D"/><stop offset="100%" stop-color="#121A16"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6C78B"/><stop offset="50%" stop-color="#C8A96A"/><stop offset="100%" stop-color="#8B6A3E"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Madera noble -->
  <g transform="translate(60, 70)" opacity="0.3">
    <rect x="0" y="20" width="130" height="80" rx="6" fill="none" stroke="url(#gold)" stroke-width="1.2"/>
    <g transform="translate(20, 35)">
      <rect x="0" y="0" width="90" height="10" rx="2" fill="#C8A96A" opacity="0.2"/>
      <rect x="0" y="14" width="90" height="10" rx="2" fill="#C8A96A" opacity="0.15"/>
      <rect x="0" y="28" width="90" height="10" rx="2" fill="#C8A96A" opacity="0.12"/>
      <rect x="0" y="42" width="90" height="10" rx="2" fill="#C8A96A" opacity="0.1"/>
    </g>
    <text x="65" y="125" font-family="system-ui,sans-serif" font-size="10" fill="#7A8C85" text-anchor="middle">Madera Noble</text>
  </g>
  <!-- Paño de fieltro -->
  <g transform="translate(235, 70)" opacity="0.3">
    <rect x="0" y="20" width="130" height="80" rx="6" fill="none" stroke="url(#gold)" stroke-width="1.2"/>
    <rect x="15" y="35" width="100" height="50" rx="4" fill="#1a5c3a" opacity="0.4"/>
    <line x1="15" y1="48" x2="115" y2="48" stroke="#C8A96A" stroke-width="0.3" opacity="0.3"/>
    <line x1="15" y1="60" x2="115" y2="60" stroke="#C8A96A" stroke-width="0.3" opacity="0.3"/>
    <line x1="15" y1="72" x2="115" y2="72" stroke="#C8A96A" stroke-width="0.3" opacity="0.3"/>
    <text x="65" y="125" font-family="system-ui,sans-serif" font-size="10" fill="#7A8C85" text-anchor="middle">Paño Premium</text>
  </g>
  <!-- Accesorios metálicos -->
  <g transform="translate(410, 70)" opacity="0.3">
    <rect x="0" y="20" width="130" height="80" rx="6" fill="none" stroke="url(#gold)" stroke-width="1.2"/>
    <g transform="translate(30, 38)">
      <circle cx="15" cy="15" r="12" fill="none" stroke="#C8A96A" stroke-width="0.8"/>
      <circle cx="15" cy="15" r="6" fill="#C8A96A" opacity="0.15"/>
      <circle cx="55" cy="15" r="12" fill="none" stroke="#C8A96A" stroke-width="0.8"/>
      <circle cx="55" cy="15" r="6" fill="#C8A96A" opacity="0.15"/>
    </g>
    <text x="65" y="125" font-family="system-ui,sans-serif" font-size="10" fill="#7A8C85" text-anchor="middle">Herrajes</text>
  </g>
  <!-- Connecting dots -->
  <g opacity="0.15">
    <circle cx="200" cy="130" r="3" fill="#C8A96A"/>
    <circle cx="215" cy="130" r="2" fill="#C8A96A"/>
    <circle cx="375" cy="130" r="3" fill="#C8A96A"/>
    <circle cx="390" cy="130" r="2" fill="#C8A96A"/>
  </g>
  <text x="300" y="260" font-family="Georgia,serif" font-size="18" fill="#C8A96A" text-anchor="middle" letter-spacing="3" opacity="0.7">MATERIALES</text>
  <text x="300" y="285" font-family="system-ui,sans-serif" font-size="11" fill="#7A8C85" text-anchor="middle" letter-spacing="1">Solo lo mejor para tus mesas de juego</text>
  <path d="M15 15 L45 15 M15 15 L15 45" stroke="#C8A96A" stroke-width="0.8" fill="none" opacity="0.12"/>
  <path d="M585 15 L555 15 M585 15 L585 45" stroke="#C8A96A" stroke-width="0.8" fill="none" opacity="0.12"/>
  <path d="M15 385 L45 385 M15 385 L15 355" stroke="#C8A96A" stroke-width="0.8" fill="none" opacity="0.12"/>
  <path d="M585 385 L555 385 M585 385 L585 355" stroke="#C8A96A" stroke-width="0.8" fill="none" opacity="0.12"/>
</svg>
