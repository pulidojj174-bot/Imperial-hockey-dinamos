<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2A1D"/><stop offset="100%" stop-color="#121A16"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6C78B"/><stop offset="50%" stop-color="#C8A96A"/><stop offset="100%" stop-color="#8B6A3E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8A96A" stop-opacity="0.08"/><stop offset="100%" stop-color="#C8A96A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="220" rx="200" ry="160" fill="url(#glow)"/>
  <!-- Gaming table top view -->
  <g transform="translate(250, 100)" opacity="0.35">
    <rect x="0" y="30" width="300" height="180" rx="20" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
    <rect x="15" y="45" width="270" height="150" rx="12" fill="none" stroke="url(#gold)" stroke-width="0.8"/>
    <!-- Table felt surface pattern -->
    <line x1="150" y1="45" x2="150" y2="195" stroke="#C8A96A" stroke-width="0.4" opacity="0.3"/>
    <line x1="15" y1="120" x2="285" y2="120" stroke="#C8A96A" stroke-width="0.4" opacity="0.3"/>
    <!-- Chip stacks -->
    <g transform="translate(60, 70)">
      <ellipse cx="15" cy="10" rx="15" ry="6" fill="none" stroke="#C8A96A" stroke-width="0.6"/>
      <ellipse cx="15" cy="6" rx="15" ry="6" fill="none" stroke="#C8A96A" stroke-width="0.6"/>
      <ellipse cx="15" cy="2" rx="15" ry="6" fill="#C8A96A" opacity="0.15"/>
    </g>
    <!-- Dice -->
    <g transform="translate(200, 140)">
      <rect x="0" y="0" width="22" height="22" rx="3" fill="none" stroke="#C8A96A" stroke-width="0.8" transform="rotate(15 11 11)"/>
      <circle cx="11" cy="11" r="2" fill="#C8A96A" opacity="0.4"/>
    </g>
    <!-- Cards -->
    <g transform="translate(120, 70)">
      <rect x="0" y="0" width="24" height="34" rx="2" fill="none" stroke="#C8A96A" stroke-width="0.6" transform="rotate(-8 12 17)"/>
      <rect x="8" y="0" width="24" height="34" rx="2" fill="none" stroke="#C8A96A" stroke-width="0.6" transform="rotate(5 20 17)"/>
    </g>
  </g>
  <!-- Decorative stars -->
  <g opacity="0.12">
    <polygon points="180,140 183,148 192,148 185,153 187,162 180,156 173,162 175,153 168,148 177,148" fill="#C8A96A"/>
    <polygon points="620,180 623,188 632,188 625,193 627,202 620,196 613,202 615,193 608,188 617,188" fill="#C8A96A"/>
  </g>
  <text x="400" y="370" font-family="Georgia,serif" font-size="22" fill="#C8A96A" text-anchor="middle" letter-spacing="4" opacity="0.6">NUESTRA MISIÓN</text>
  <text x="400" y="400" font-family="system-ui,sans-serif" font-size="12" fill="#7A8C85" text-anchor="middle" letter-spacing="1">La mejor experiencia de juego en cada mesa</text>
  <!-- Corner accents -->
  <path d="M20 20 L60 20 M20 20 L20 60" stroke="#C8A96A" stroke-width="0.8" fill="none" opacity="0.12"/>
  <path d="M780 20 L740 20 M780 20 L780 60" stroke="#C8A96A" stroke-width="0.8" fill="none" opacity="0.12"/>
  <path d="M20 480 L60 480 M20 480 L20 440" stroke="#C8A96A" stroke-width="0.8" fill="none" opacity="0.12"/>
  <path d="M780 480 L740 480 M780 480 L780 440" stroke="#C8A96A" stroke-width="0.8" fill="none" opacity="0.12"/>
</svg>
